services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bim_system
      POSTGRES_USER: bim
      POSTGRES_PASSWORD: bimpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bim -d bim_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bim:bimpass@postgres:5432/bim_system
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  exports:
